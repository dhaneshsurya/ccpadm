{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="portal-center">
    <div class="glass-card glass-card--medium">
        <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="portal-input" placeholder="Enter username" required>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="portal-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <a href="{% url 'home' %}" class="link-text">Back to Home</a>
    </div>
</div>
{% endblock %}
