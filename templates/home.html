{% extends 'base.html' %}

{% block title %}Home - Chaitanya College{% endblock %}

{% block content %}
<div class="portal-center">
    <div class="glass-card glass-card--narrow">
        <div class="home-hero">
            <h2><i class="fas fa-graduation-cap"></i> Admission Portal</h2>
            <p>Session 2026-27 — Register, apply, and track your admission online.</p>
        </div>
        <div class="home-actions">
            <a href="{% url 'register' %}" class="btn btn-success btn-block">
                <i class="fas fa-user-plus"></i> New Registration
            </a>
            <a href="{% url 'login' %}" class="btn btn-secondary btn-block">
                <i class="fas fa-sign-in-alt"></i> Student Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
